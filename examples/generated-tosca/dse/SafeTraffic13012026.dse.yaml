tosca_definitions_version: tosca_simple_yaml_1_3

metadata:
  name: "TrafficApplication_FullyExpanded"
  description: "Complete unrolling of 61 compute nodes with explicit typing and connectivity."

topology_template:

  system_params:
    num_pods: 2000
    num_steps: 500
    mu: 0.8
    
    pod_templates:
      MultisensorMerger:
        dockerImage: "ci.hesi.energy:5000/myrtus/multi_sensor_merger"
        port: 5557
        required_cpu_cores: 4
        required_memory_gb: 8
        creation_probability: 0.4
        min_exec_steps: 60
        max_exec_steps: 120
        layer_restriction: "none"
      MapMatcher:
        dockerImage: "ci.hesi.energy:5000/myrtus/map-matcher"
        port: 5557
        required_cpu_cores: 2
        required_memory_gb: 4
        creation_probability: 0.3
        min_exec_steps: 30
        max_exec_steps: 90
        layer_restriction: "none"
      RedLightDetection:
        dockerImage: "ci.hesi.energy:5000/myrtus/sensor_tracker"
        port: 5557
        required_cpu_cores: 2
        required_memory_gb: 4
        creation_probability: 0.15
        min_exec_steps: 10
        max_exec_steps: 60
        layer_restriction: "edge"
      IllegalTrajectoryDetection:
        dockerImage: "ci.hesi.energy:5000/myrtus/illegal_trajectory_detection"
        port: 5557
        required_cpu_cores: 1
        required_memory_gb: 2
        creation_probability: 0.15
        min_exec_steps: 10
        max_exec_steps: 50
        layer_restriction: "fog"

    comm_costs:
      edge: { edge: 1.0, fog: 5.0, cloud: 15.0 }
      fog: { edge: 5.0, fog: 1.0, cloud: 5.0 }
      cloud: { edge: 15.0, fog: 5.0, cloud: 1.0 }

    step_costs:
      edge: { edge: 1, fog: 5, cloud: 15 }
      fog: { edge: 5, fog: 1, cloud: 5 }
      cloud: { edge: 15, fog: 5, cloud: 1 }

  architecture:
    nodes:
      # --- Edge Layer (50 Nodes) linked to EdgeCompute template ---
      - { name: "Edge_Node_1", layer: "edge", type: "EdgeCompute" }
      - { name: "Edge_Node_2", layer: "edge", type: "EdgeCompute" }
